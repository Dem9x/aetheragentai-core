services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aetheragentai
      POSTGRES_USER: aaa
      POSTGRES_PASSWORD: aaa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aaa -d aetheragentai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  postgres_data:
